<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Knives Out Homepage</title>
        <link rel="stylesheet" href="style/style.css">
    </head>
    <body>
        <form>

            <fieldset>
                <legend>Favorite Movie Survey</legend>

                <label>Your Name:</label>
                <input type="text" name="name" placeholder="e.g. Grace Poulton">

                <label>Email Address:</label>
                <input type="email" name="email" placeholder="e.g. grace@gmail.com">
            

            <label>Submit Your Favorite Movie:</label>
            <input type="text" name="favorite-movie" placeholder="Type your favorite movie here">

            <label>Favorite Genre:</label> <!--Dropdown Label-->
            <select name="genre">
                <option value="classic">Classic</option>
                <option value="fantasy">Fantasy</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="romance">Romance</option>
            </select>

            <p>Preferred Format:</p>
            <label><input type="radio" name="format" value="print">Print</label>
            <label><input type="radio" name="format" value="ebook">eBook</label>
            <label><input type="radio" name="format" value="audiobook">Audiobook</label>

            <label>
                <input type="checkbox" name="subscribe" value="yes">
                Subscribe to our monthly movie club newsletter
            </label>

            <button type="submit">Submit</button>
            </fieldset>
        </form>
    </body>

    <nav>
    <ul>
        <li><a href="index.html" style="display:inline-block;"> Home</a></li>
        <li><a href="about.html" style="display:inline-block;">About</a></li>
        <li><a href="info.html" style="display:inline-block;">Info</a></li>
    </ul>
</nav>

</html>
