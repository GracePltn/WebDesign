<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Knives Out Homepage</title>
        <link rel="stylesheet" href="style/style.css">
    </head>
    <body>

        <h4>My Favorite Movies</h4>

        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Director</th>
                <th>Genre</th>
            </tr>
            </thead>
            <tbody>
                <!--Table contents go here-->
                <tr>
                    <td>Knives Out</td>
                    <td>Rian Johnson</td>
                    <td>Mystery</td>
                </tr>
            </tbody>
        </table>

        <form>

            <fieldset>
                <legend>Favorite Movie Survey</legend>

                <label>Your Name:</label>
                <input type="text" name="name" placeholder="e.g. First Name Last Name">

                <label>Email Address:</label>
                <input type="email" name="email" placeholder="e.g. name@email.com">
            

            <label>Submit Your Favorite Movie:</label>
            <input type="text" name="favorite-movie" placeholder="Type your favorite movie here">

            <label>Favorite Genre:</label> <!--Dropdown Label-->
            <select name="genre">
                <option value="horror">Horror</option>
                <option value="fantasy">Fantasy</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="romance">Romance</option>
            </select>

            <p>Preferred Format:</p>
            <label><input type="radio" name="format" value="theatre">Theatre</label>
            <label><input type="radio" name="format" value="streaming">Streaming</label>
            <label><input type="radio" name="format" value="dvds">DVDs</label>

            <label>
                <input type="checkbox" name="subscribe" value="yes">
                Subscribe to our montly Movie Club newsletter!
            </label>

            <button type="submit">Submit</button>
            </fieldset>
        </form>
    </body>

    <nav>
    <ul>
        <li><a href="index.html" style="display:inline-block;"> Home</a></li>
        <li><a href="about.html" style="display:inline-block;">About</a></li>
        <li><a href="info.html" style="display:inline-block;">Info</a></li>
    </ul>
</nav>

</html>
